<!doctype html> <!-- DOCTYPE untuk HTML5 (Pertemuan 1: Pengenalan HTML Dasar) - Mendefinisikan dokumen sebagai HTML5 -->
<html lang="en"> <!-- Tag html dengan atribut lang (Pertemuan 1) - Menentukan bahasa dokumen untuk aksesibilitas -->
  <head> <!-- Head section untuk metadata (Pertemuan 1) - Berisi informasi tentang halaman yang tidak ditampilkan -->
    <meta charset="UTF-8" /> <!-- Meta charset untuk encoding (Pertemuan 1) - Mengatur encoding karakter ke UTF-8 untuk mendukung karakter internasional -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" /> <!-- Link favicon (Pertemuan 1) - Ikon yang muncul di tab browser -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- Meta viewport untuk responsif (Pertemuan 3: Bootstrap & Layout) - Mengatur tampilan di perangkat mobile -->
    <meta name="description" content="Dashboard monitoring produksi dan kartu karyawan untuk sistem industri." /> <!-- Meta description untuk SEO (Pertemuan 1) - Deskripsi halaman untuk mesin pencari -->
    <title>Sistem Industri | Monitoring Produksi</title> <!-- Title halaman (Pertemuan 1) - Judul yang muncul di tab browser -->
  </head>
  <body> <!-- Body untuk konten visible (Pertemuan 1) - Bagian utama yang ditampilkan di browser -->
    <div id="app"></div> <!-- Root div untuk React mounting (Pertemuan 9: React.js) - Tempat React akan me-render aplikasi -->
    <script type="module" src="/src/main.jsx"></script> <!-- Script untuk load main.jsx (Pertemuan 9) - Memuat entry point React dengan ES modules -->
  </body>
</html>
