<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyek Mini - Sistem Antrian Job Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .bg-ungu { background-color: #E0B0FF; }
        .btn-ungu { background-color: #9b59b6; color: white; }
        .btn-ungu:hover { background-color: #7d3fb5; color: white; }
        .log-item {
            background: #f9f9f9;
            border-left: 3px solid #9b59b6;
            padding: 7px 12px;
            margin-bottom: 5px;
            border-radius: 4px;
            font-size: 13px;
            color: #444;
        }
        .log-item.baru {
            border-left: 3px solid #e74c3c;
            background: #fff5f5;
            color: #c0392b;
            font-weight: bold;
        }
        .log-item.selesai {
            border-left: 3px solid #27ae60;
            background: #f0fff4;
            color: #1e8449;
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-light">

    <header class="bg-ungu text-dark py-4 shadow">
        <div class="container text-center">
            <h1 class="fw-bold mb-1">Proyek Mini - Sistem Antrian Job Shop</h1>
            <p class="mb-0">Dibuat oleh: Nailah Azka Iftinah</p>
            <p class="mb-0">23051430026</p>
        </div>
    </header>

    <main class="container my-5" style="max-width: 700px;">

        <!-- TOMBOL -->
        <div class="text-center mb-3">
            <button onclick="jalankanSimulasi()" class="btn btn-ungu fw-bold px-5">
                Mulai Simulasi
            </button>
        </div>

        <!-- TABEL DAFTAR ANTRIAN -->
        <div class="card shadow-sm mb-3">
            <div class="card-body">
                <p class="fw-semibold text-center mb-3">Daftar Antrian Mesin</p>
                <table class="table table-bordered text-center mb-0">
                    <thead style="background-color:#E0B0FF;">
                        <tr>
                            <th>ID Job</th>
                            <th>Proses</th>
                            <th>Durasi (menit)</th>
                        </tr>
                    </thead>
                    <tbody id="tabelAntrian">
                        <tr id="emptyAntrian">
                            <td colspan="3" class="text-muted fst-italic py-3">Belum ada data</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- STATUS MESIN -->
        <div class="card shadow-sm mb-3">
            <div class="card-body">
                <p class="fw-semibold text-center mb-2">Status Mesin</p>
                <p id="statusMesin" class="text-center text-muted small mb-2">
                    Menunggu simulasi dimulai...
                </p>
                <div class="progress" style="height:14px; border-radius:8px;">
                    <div id="progressBar" class="progress-bar"
                        style="width:0%; background:#9b59b6; transition: width 0.4s;">
                    </div>
                </div>
            </div>
        </div>

        <!-- LOG PROSES -->
        <div class="card shadow-sm mb-5">
            <div class="card-body">
                <p class="fw-semibold text-center mb-3">Log Proses Mesin</p>
                <div id="logProses">
                    <p class="text-muted small text-center fst-italic">
                        Log akan muncul setelah simulasi dijalankan
                    </p>
                </div>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="ProyekMini.js"></script>

</body>
</html>
