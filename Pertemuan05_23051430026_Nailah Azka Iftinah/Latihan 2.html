<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 2 - Array Manipulation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .bg-ungu { background-color: #E0B0FF; }
        .btn-ungu { background-color: #9b59b6; color: white; }
        .btn-ungu:hover { background-color: #7d3fb5; color: white; }
    </style>
</head>
<body class="bg-light">

    <header class="bg-ungu text-dark py-4 shadow">
        <div class="container text-center">
            <h1 class="fw-bold mb-1">Latihan 2 - Array Manipulation</h1>
            <p class="mb-0">Dibuat oleh: Nailah Azka Iftinah</p>
            <p class="mb-0">23051430026</p>
        </div>
    </header>

    <main class="container my-5" style="max-width: 700px;">

        <div class="card shadow-sm mb-3">
            <div class="card-body text-center">
                <p class="fw-semibold mb-1">Pencarian Cacat Produk</p>
                <p class="text-muted small mb-3">Mencari berapa kali "C-001" muncul dalam array</p>

                <div class="p-3 rounded mb-3" style="background:#f9f9f9; border:1px solid #eee;">
                    <p class="text-muted small mb-2"><strong>Daftar Produk Cacat:</strong></p>
                    <div id="badgeCacat" class="d-flex flex-wrap justify-content-center gap-2"></div>
                </div>

                <button onclick="hitungCacat()" class="btn btn-ungu w-100 fw-bold mb-3">
                    Cek Jumlah C-001
                </button>

                <div id="hasilCacat" class="p-2 rounded text-muted small"
                    style="background:#f5f5f5;">
                    Klik tombol untuk melihat hasil
                </div>
            </div>
        </div>

        <div class="card shadow-sm mb-5">
            <div class="card-body">
                <p class="fw-semibold text-center mb-3">Rekap Perhitungan</p>
                <table class="table table-bordered text-center mb-0">
                    <thead style="background-color:#E0B0FF;">
                        <tr>
                            <th>Keterangan</th>
                            <th>Hasil</th>
                        </tr>
                    </thead>
                    <tbody id="rekapTable">
                        <tr id="emptyRow">
                            <td colspan="2" class="text-muted fst-italic py-3">Belum ada data</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="Latihan 2.js"></script>

</body>
</html>
