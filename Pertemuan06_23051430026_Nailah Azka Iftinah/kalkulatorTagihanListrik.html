<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Tagihan Listrik</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="kalkulatorTagihanListrik.css">
</head>

<body>

<div class="container py-5">

    <!-- Header -->
    <div class="text-center text-black mb-4">
        <h1 class="fw-bold">Proyek Mini_Kalkulator Tagihan Listrik</h1>
        <p class="mb-1">Nailah Azka Iftinah</p>
        <p class="mb-0">NIM: 23051430026</p>
    </div>

    <!-- Card -->
    <div class="card card-custom shadow-lg p-4">

        <!-- Input -->
        <div class="mb-3 text-center">
            <label class="form-label fw-semibold">Daya (Watt)</label>
            <input type="number" id="daya" class="form-control form-control-lg" placeholder="Contoh: 900">
        </div>

        <div class="mb-3 text-center">
            <label class="form-label fw-semibold">Jam Pemakaian</label>
            <input type="number" id="jam" class="form-control form-control-lg" placeholder="Contoh: 5">
        </div>

        <!-- Hasil -->
        <div class="hasil-box text-center shadow-sm mb-3">
            <h5>Total Konsumsi Energi</h5>
            <h3 id="hasilKwh" class="fw-bold text-primary">0 kWh</h3>
        </div>

        <div class="hasil-box text-center shadow-sm mb-3">
            <h5>Estimasi Biaya</h5>
            <h3 id="hasilBiaya" class="fw-bold text-success">Rp 0</h3>
        </div>

        <!-- Rekapan -->
        <div class="card shadow-sm p-3 text-center">
            <h5>Rekapan Penggunaan Listrik</h5>
            <p id="rekapText">Belum ada data yang dihitung.</p>
            <p id="kategori" class="fw-semibold text-secondary">Kategori: -</p>
        </div>

    </div>

</div>

<script src="kalkulatorTagihanListrik.js"></script>
</body>
</html>
