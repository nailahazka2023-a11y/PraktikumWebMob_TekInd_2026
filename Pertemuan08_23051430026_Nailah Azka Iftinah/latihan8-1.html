<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pertemuan 8 - Fetch API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container my-5">
        <h2 class="text-center mb-4">Data Karyawan (Dari Server)</h2>
        
        <div class="text-center mb-4">
            <button id="btnLoad" class="btn btn-primary">
                Muat Data dari API
            </button>
            
            <button id="btnAdd" class="btn btn-success">
                Tambah Karyawan Baru (POST)
            </button>
        </div>

        <div id="loading" class="d-none text-center my-3">
            <div class="spinner-border text-primary" role="status"></div>
            <p>Menghubungi Server...</p>
        </div>

        <div id="containerKaryawan" class="row"></div>
    </div>

    <script src="latihan8-1.js"></script>

</body>
</html>
